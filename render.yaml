services:
  - type: web
    name: business-erp
    runtime: node
    plan: free
    buildCommand: npm install && cd client && npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: erp-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
